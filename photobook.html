<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOTOBOOK — SATOSHI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Serif+Thai:wght@400;700&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #080806; }
body {
  font-family: 'Sarabun', sans-serif;
  background: #080806;
  color: #d4d0c8;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.container {
  text-align: center;
  max-width: 600px;
}

.block-height {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: #666660;
  margin-bottom: 60px;
}

.block-height a {
  color: inherit;
  text-decoration: none;
  transition: color 0.3s;
}

.block-height a:hover {
  color: #F7931A;
}

.block-num {
  color: #F7931A;
}

.title-th {
  font-family: 'Noto Serif Thai', serif;
  font-size: clamp(28px, 6vw, 42px);
  color: #d4d0c8;
  margin-bottom: 16px;
  letter-spacing: 0.2em;
}

.title-en {
  font-family: 'Space Mono', monospace;
  font-size: clamp(32px, 7vw, 52px);
  color: #F7931A;
  opacity: 0.6;
  letter-spacing: 0.3em;
  margin-bottom: 80px;
}

.back-link {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: #666660;
  text-decoration: none;
  border: 1px solid rgba(102,102,96,0.3);
  padding: 12px 24px;
  display: inline-block;
  transition: all 0.3s;
}

.back-link:hover {
  color: #F7931A;
  border-color: #F7931A;
}

.error-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8,8,6,0.98);
  z-index: 99999;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.error-overlay.active { display: flex; }

.error-content {
  max-width: 600px;
  text-align: center;
}

.error-title {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  letter-spacing: 3px;
  color: #F7931A;
  margin-bottom: 16px;
}

.error-message {
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
  color: #666660;
  line-height: 1.8;
  margin-bottom: 24px;
}

.error-close {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: #666660;
  background: transparent;
  border: 1px solid rgba(102,102,96,0.3);
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.3s;
}

.error-close:hover {
  color: #F7931A;
  border-color: #F7931A;
}

@media (max-width: 640px) {
  .title-th { font-size: 24px; }
  .title-en { font-size: 28px; margin-bottom: 60px; }
  .back-link { font-size: 10px; padding: 10px 20px; }
}

/* Pre-production banner */
.preprod-banner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: rgba(247, 147, 26, 0.95);
  color: #080806;
  padding: 10px 16px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border-bottom: 1px solid rgba(8, 8, 6, 0.1);
  transition: transform 0.3s ease-out, opacity 0.3s ease-out;
}
.preprod-banner.dismissed {
  transform: translateY(-100%);
  opacity: 0;
}
.preprod-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 1200px;
  gap: 16px;
}
.preprod-text {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.preprod-text span:first-child {
  font-family: 'Sarabun', sans-serif;
}
.preprod-close {
  background: transparent;
  border: none;
  color: #080806;
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  padding: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
  font-family: 'Space Mono', monospace;
}
.preprod-close:hover {
  opacity: 0.7;
}
@media (max-width: 640px) {
  .preprod-text { font-size: 11px; }
  .preprod-banner { padding: 8px 12px; }
}
</style>
</head>
<body>
<div id="preProdBanner" class="preprod-banner">
  <div class="preprod-content">
    <span class="preprod-text">
      <span>เว็บไซต์และภาพยนตร์อยู่ในช่วง pre-production · ขออภัยด้วยหาก feature บางส่วนยังไม่ทำงาน</span>
      <span>Website and film are in pre-production · Apologies if some features don't work yet</span>
    </span>
    <button class="preprod-close" onclick="dismissPreProdBanner()" aria-label="Close banner">×</button>
  </div>
</div>

<div class="container">
  <div class="block-height">
    BLOCK <a href="https://mempool.space/" target="_blank" rel="noopener"><span class="block-num">———</span></a>
  </div>

  <h1 class="title-th">หนังสือภาพ — เร็วๆ นี้</h1>
  <h2 class="title-en">PHOTOBOOK — COMING SOON</h2>

  <a href="index.html" class="back-link">← กลับหน้าหลัก / BACK HOME</a>
</div>

<div class="error-overlay" id="errorOverlay">
  <div class="error-content">
    <div class="error-title">ERROR</div>
    <div class="error-message" id="errorMessage"></div>
    <button class="error-close" onclick="document.getElementById('errorOverlay').classList.remove('active')">CLOSE</button>
  </div>
</div>

<script>
// Block height counter
fetch('https://mempool.space/api/blocks/tip/height')
  .then(r => r.json())
  .then(h => {
    const nums = document.querySelectorAll('.block-num');
    nums.forEach(n => n.textContent = h.toLocaleString());
  })
  .catch(e => console.error('Block height fetch failed:', e));

// Global error handler
window.addEventListener('error', function(e) {
  document.getElementById('errorMessage').textContent = e.message || 'An unexpected error occurred';
  document.getElementById('errorOverlay').classList.add('active');
});
</script>

<script>
// Pre-production banner initialization and dismissal
(function() {
  var banner = document.getElementById('preProdBanner');
  if (!banner) return;

  // Check if banner was previously dismissed
  try {
    if (localStorage.getItem('satoshi_preprod_banner_dismissed') === '1') {
      banner.style.display = 'none';
      return;
    }
  } catch (e) {
    // localStorage not available (private browsing) - show banner anyway
  }

  // Adjust nav position if it exists and is fixed
  function adjustNav() {
    var nav = document.querySelector('nav');
    if (nav && window.getComputedStyle(nav).position === 'fixed') {
      var bannerHeight = banner.offsetHeight;
      nav.style.top = bannerHeight + 'px';
      nav.style.transition = 'top 0.3s ease-out';
    }
  }

  // Wait for DOM to be fully loaded
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', adjustNav);
  } else {
    adjustNav();
  }
})();

function dismissPreProdBanner() {
  var banner = document.getElementById('preProdBanner');
  if (!banner) return;

  banner.classList.add('dismissed');

  // Save dismissal state
  try {
    localStorage.setItem('satoshi_preprod_banner_dismissed', '1');
  } catch (e) {
    // localStorage not available - dismissal won't persist
  }

  // Reset nav position after animation
  setTimeout(function() {
    banner.style.display = 'none';
    var nav = document.querySelector('nav');
    if (nav && window.getComputedStyle(nav).position === 'fixed') {
      nav.style.top = '0';
    }
  }, 300);
}
</script>

</body>
</html>
